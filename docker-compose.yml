version: "3.9"

services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: damolak-devops-app:local
    container_name: damolak-app
    ports:
      - "8080:8080"
    environment:
      - ENVIRONMENT=development
      - APP_VERSION=local
      - PORT=8080
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
