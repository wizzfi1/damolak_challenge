name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION:       eu-west-1
  ECR_REPO:         damolak-devops-app
  ECS_CLUSTER:      damolak-devops-app-cluster
  ECS_SERVICE:      damolak-devops-app-service
  CONTAINER_NAME:   damolak-devops-app
  TF_WORKING_DIR:   terraform/environments/prod

# Prevent concurrent deployments to the same environment
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  #  Job 1: Test 
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest test_app.py -v --tb=short

      - name: Build Docker image (smoke test)
        run: docker build -t ${{ env.ECR_REPO }}:test .

      - name: Run container health check
        run: |
          docker run -d --name smoke-test -p 8080:8080 ${{ env.ECR_REPO }}:test
          sleep 5
          curl --fail http://localhost:8080/health || (docker logs smoke-test && exit 1)
          docker stop smoke-test

  #  Job 2: Deploy (main branch only) 
  deploy:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    permissions:
      id-token: write   # for OIDC
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "IMAGE_TAG=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build, tag, and push image to ECR
        working-directory: app
        env:
          IMAGE_URI: ${{ steps.tag.outputs.IMAGE_URI }}
          IMAGE_TAG: ${{ steps.tag.outputs.IMAGE_TAG }}
        run: |
          docker build \
            --build-arg APP_VERSION=$IMAGE_TAG \
            -t $IMAGE_URI \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest \
            .
          docker push $IMAGE_URI
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest
          echo "Pushed image: $IMAGE_URI"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var="image_tag=${{ steps.tag.outputs.IMAGE_TAG }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Update ECS Service (force new deployment)
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for deployment to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }}
          echo "Deployment stable"

      - name: Verify deployment
        run: |
          ALB_DNS=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --query 'services[0].loadBalancers[0]' \
            --output text)
          echo "Deployment complete. Image: ${{ steps.tag.outputs.IMAGE_URI }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed for commit ${{ github.sha }}"
          echo "Check CloudWatch logs for details"
